name: uganda_epilepsy_anonymized
tag: uganda_anon
adapter: data_adapters.jsonl:load_split
prompt_root: ../prompts

setting: "a clinic in Uganda"
input_description: "patient clinical notes available before the prescribing decision"
target_description: "the doctor's prescription"

drug_list:
  - carbamazepine
  - clobazam
  - clonazepam
  - ethosuximide
  - lamotrigine
  - levetiracetam
  - phenobarbital
  - phenytoin
  - topiramate
  - valproate

paths:
  cases: ../data/uganda_cases_anon.jsonl

split:
  strategy: stratified
  cohort: A
  train_patients: 50
  val_patients: 20
  split_seed: 42
  max_visits: 3
  strata:
    mono: 0.5
    mixed: 0.3
    poly: 0.2
